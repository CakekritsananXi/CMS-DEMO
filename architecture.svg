<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: bold 24px sans-serif; fill: #1f2937; }
      .subtitle { font: 16px sans-serif; fill: #4b5563; }
      .label { font: 14px sans-serif; fill: #374151; }
      .small-label { font: 12px sans-serif; fill: #6b7280; }
      .layer-title { font: bold 16px sans-serif; fill: #1f2937; }
      .component { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 2; }
      .frontend { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .backend { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .database { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .external { fill: #fce7f3; stroke: #ec4899; stroke-width: 2; }
      .flow-arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .data-flow { stroke: #3b82f6; stroke-width: 2; fill: none; marker-end: url(#arrowhead-blue); }
      .auth-flow { stroke: #ef4444; stroke-width: 2; fill: none; marker-end: url(#arrowhead-red); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title">ContentFlow - System Architecture</text>
  <text x="600" y="55" text-anchor="middle" class="subtitle">Modern Content Planning Platform</text>

  <!-- Frontend Layer -->
  <rect x="50" y="100" width="1100" height="200" class="frontend" rx="10"/>
  <text x="70" y="125" class="layer-title">Frontend Layer (React + TypeScript)</text>

  <!-- Main App -->
  <rect x="80" y="140" width="120" height="60" class="component" rx="5"/>
  <text x="140" y="165" text-anchor="middle" class="label">App.tsx</text>
  <text x="140" y="180" text-anchor="middle" class="small-label">Router & Layout</text>

  <!-- Navigation -->
  <rect x="220" y="140" width="120" height="60" class="component" rx="5"/>
  <text x="280" y="165" text-anchor="middle" class="label">Navigation</text>
  <text x="280" y="180" text-anchor="middle" class="small-label">Global Nav</text>

  <!-- Pages -->
  <rect x="360" y="140" width="100" height="60" class="component" rx="5"/>
  <text x="410" y="165" text-anchor="middle" class="label">Dashboard</text>
  <text x="410" y="180" text-anchor="middle" class="small-label">GET /</text>

  <rect x="480" y="140" width="100" height="60" class="component" rx="5"/>
  <text x="530" y="165" text-anchor="middle" class="label">Calendar</text>
  <text x="530" y="180" text-anchor="middle" class="small-label">GET /calendar</text>

  <rect x="600" y="140" width="100" height="60" class="component" rx="5"/>
  <text x="650" y="165" text-anchor="middle" class="label">Ideation</text>
  <text x="650" y="180" text-anchor="middle" class="small-label">GET /ideation</text>

  <rect x="720" y="140" width="100" height="60" class="component" rx="5"/>
  <text x="770" y="165" text-anchor="middle" class="label">Strategy</text>
  <text x="770" y="180" text-anchor="middle" class="small-label">GET /strategy</text>

  <rect x="840" y="140" width="100" height="60" class="component" rx="5"/>
  <text x="890" y="165" text-anchor="middle" class="label">Library</text>
  <text x="890" y="180" text-anchor="middle" class="small-label">GET /library</text>

  <rect x="960" y="140" width="100" height="60" class="component" rx="5"/>
  <text x="1010" y="165" text-anchor="middle" class="label">Analytics</text>
  <text x="1010" y="180" text-anchor="middle" class="small-label">GET /analytics</text>

  <!-- Shared Components -->
  <rect x="80" y="220" width="150" height="60" class="component" rx="5"/>
  <text x="155" y="245" text-anchor="middle" class="label">Shared Components</text>
  <text x="155" y="260" text-anchor="middle" class="small-label">UI, Layout, Common</text>

  <!-- State Management -->
  <rect x="250" y="220" width="150" height="60" class="component" rx="5"/>
  <text x="325" y="245" text-anchor="middle" class="label">State Management</text>
  <text x="325" y="260" text-anchor="middle" class="small-label">React Hooks & Context</text>

  <!-- Utils & Services -->
  <rect x="420" y="220" width="150" height="60" class="component" rx="5"/>
  <text x="495" y="245" text-anchor="middle" class="label">Utils & Services</text>
  <text x="495" y="260" text-anchor="middle" class="small-label">API, Formatters, Helpers</text>

  <!-- API Layer -->
  <rect x="50" y="330" width="1100" height="120" class="backend" rx="10"/>
  <text x="70" y="355" class="layer-title">API Layer (RESTful Services)</text>

  <!-- API Endpoints -->
  <rect x="80" y="370" width="120" height="60" class="component" rx="5"/>
  <text x="140" y="390" text-anchor="middle" class="label">Content API</text>
  <text x="140" y="405" text-anchor="middle" class="small-label">POST /api/content</text>
  <text x="140" y="420" text-anchor="middle" class="small-label">GET /api/content</text>

  <rect x="220" y="370" width="120" height="60" class="component" rx="5"/>
  <text x="280" y="390" text-anchor="middle" class="label">Calendar API</text>
  <text x="280" y="405" text-anchor="middle" class="small-label">POST /api/schedule</text>
  <text x="280" y="420" text-anchor="middle" class="small-label">PUT /api/schedule/:id</text>

  <rect x="360" y="370" width="120" height="60" class="component" rx="5"/>
  <text x="420" y="390" text-anchor="middle" class="label">Ideas API</text>
  <text x="420" y="405" text-anchor="middle" class="small-label">POST /api/ideas</text>
  <text x="420" y="420" text-anchor="middle" class="small-label">GET /api/ideas</text>

  <rect x="500" y="370" width="120" height="60" class="component" rx="5"/>
  <text x="560" y="390" text-anchor="middle" class="label">Strategy API</text>
  <text x="560" y="405" text-anchor="middle" class="small-label">POST /api/briefs</text>
  <text x="560" y="420" text-anchor="middle" class="small-label">GET /api/goals</text>

  <rect x="640" y="370" width="120" height="60" class="component" rx="5"/>
  <text x="700" y="390" text-anchor="middle" class="label">Assets API</text>
  <text x="700" y="405" text-anchor="middle" class="small-label">POST /api/assets</text>
  <text x="700" y="420" text-anchor="middle" class="small-label">DELETE /api/assets/:id</text>

  <rect x="780" y="370" width="120" height="60" class="component" rx="5"/>
  <text x="840" y="390" text-anchor="middle" class="label">Analytics API</text>
  <text x="840" y="405" text-anchor="middle" class="small-label">GET /api/metrics</text>
  <text x="840" y="420" text-anchor="middle" class="small-label">GET /api/performance</text>

  <rect x="920" y="370" width="120" height="60" class="component" rx="5"/>
  <text x="980" y="390" text-anchor="middle" class="label">Auth API</text>
  <text x="980" y="405" text-anchor="middle" class="small-label">POST /api/auth/login</text>
  <text x="980" y="420" text-anchor="middle" class="small-label">POST /api/auth/logout</text>

  <!-- Database Layer -->
  <rect x="50" y="480" width="700" height="120" class="database" rx="10"/>
  <text x="70" y="505" class="layer-title">Database Layer (Supabase PostgreSQL)</text>

  <!-- Database Tables -->
  <rect x="80" y="520" width="100" height="60" class="component" rx="5"/>
  <text x="130" y="545" text-anchor="middle" class="label">Users</text>
  <text x="130" y="560" text-anchor="middle" class="small-label">Authentication</text>

  <rect x="200" y="520" width="100" height="60" class="component" rx="5"/>
  <text x="250" y="545" text-anchor="middle" class="label">Content</text>
  <text x="250" y="560" text-anchor="middle" class="small-label">Posts & Ideas</text>

  <rect x="320" y="520" width="100" height="60" class="component" rx="5"/>
  <text x="370" y="545" text-anchor="middle" class="label">Calendar</text>
  <text x="370" y="560" text-anchor="middle" class="small-label">Scheduled Items</text>

  <rect x="440" y="520" width="100" height="60" class="component" rx="5"/>
  <text x="490" y="545" text-anchor="middle" class="label">Assets</text>
  <text x="490" y="560" text-anchor="middle" class="small-label">Files & Media</text>

  <rect x="560" y="520" width="100" height="60" class="component" rx="5"/>
  <text x="610" y="545" text-anchor="middle" class="label">Analytics</text>
  <text x="610" y="560" text-anchor="middle" class="small-label">Metrics & Events</text>

  <!-- External Services -->
  <rect x="780" y="480" width="370" height="120" class="external" rx="10"/>
  <text x="800" y="505" class="layer-title">External Services & Integrations</text>

  <rect x="800" y="520" width="100" height="60" class="component" rx="5"/>
  <text x="850" y="545" text-anchor="middle" class="label">Supabase</text>
  <text x="850" y="560" text-anchor="middle" class="small-label">Auth & DB</text>

  <rect x="920" y="520" width="100" height="60" class="component" rx="5"/>
  <text x="970" y="545" text-anchor="middle" class="label">CDN</text>
  <text x="970" y="560" text-anchor="middle" class="small-label">Asset Storage</text>

  <rect x="1040" y="520" width="100" height="60" class="component" rx="5"/>
  <text x="1090" y="545" text-anchor="middle" class="label">Analytics</text>
  <text x="1090" y="560" text-anchor="middle" class="small-label">Tracking</text>

  <!-- Data Flow Arrows -->
  <!-- Frontend to API -->
  <line x1="410" y1="200" x2="410" y2="370" class="data-flow"/>
  <line x1="530" y1="200" x2="280" y2="370" class="data-flow"/>
  <line x1="650" y1="200" x2="420" y2="370" class="data-flow"/>
  <line x1="770" y1="200" x2="560" y2="370" class="data-flow"/>
  <line x1="890" y1="200" x2="700" y2="370" class="data-flow"/>
  <line x1="1010" y1="200" x2="840" y2="370" class="data-flow"/>

  <!-- API to Database -->
  <line x1="140" y1="430" x2="250" y2="520" class="data-flow"/>
  <line x1="280" y1="430" x2="370" y2="520" class="data-flow"/>
  <line x1="420" y1="430" x2="250" y2="520" class="data-flow"/>
  <line x1="560" y1="430" x2="250" y2="520" class="data-flow"/>
  <line x1="700" y1="430" x2="490" y2="520" class="data-flow"/>
  <line x1="840" y1="430" x2="610" y2="520" class="data-flow"/>

  <!-- Auth Flow -->
  <line x1="980" y1="430" x2="130" y2="520" class="auth-flow"/>
  <line x1="980" y1="370" x2="850" y2="520" class="auth-flow"/>

  <!-- External Services -->
  <line x1="700" y1="430" x2="970" y2="520" class="flow-arrow"/>
  <line x1="840" y1="430" x2="1090" y2="520" class="flow-arrow"/>

  <!-- Legend -->
  <rect x="50" y="630" width="1100" height="140" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" rx="10"/>
  <text x="70" y="655" class="layer-title">Architecture Legend</text>

  <!-- Legend Items -->
  <rect x="80" y="670" width="20" height="15" class="frontend"/>
  <text x="110" y="682" class="small-label">Frontend Components (React/TypeScript)</text>

  <rect x="280" y="670" width="20" height="15" class="backend"/>
  <text x="310" y="682" class="small-label">API Layer (RESTful Services)</text>

  <rect x="480" y="670" width="20" height="15" class="database"/>
  <text x="510" y="682" class="small-label">Database Layer (PostgreSQL)</text>

  <rect x="680" y="670" width="20" height="15" class="external"/>
  <text x="710" y="682" class="small-label">External Services</text>

  <line x1="80" y1="700" x2="120" y2="700" class="data-flow"/>
  <text x="130" y="705" class="small-label">Data Flow</text>

  <line x1="250" y1="700" x2="290" y2="700" class="auth-flow"/>
  <text x="300" y="705" class="small-label">Authentication Flow</text>

  <line x1="450" y1="700" x2="490" y2="700" class="flow-arrow"/>
  <text x="500" y="705" class="small-label">Service Integration</text>

  <!-- Key Features -->
  <text x="80" y="730" class="small-label">Key Features:</text>
  <text x="80" y="745" class="small-label">• Single Page Application (SPA) with client-side routing</text>
  <text x="80" y="760" class="small-label">• Real-time collaboration with WebSocket connections</text>
  <text x="450" y="745" class="small-label">• Responsive design with mobile-first approach</text>
  <text x="450" y="760" class="small-label">• Progressive Web App (PWA) capabilities</text>
  <text x="800" y="745" class="small-label">• Drag-and-drop content scheduling</text>
  <text x="800" y="760" class="small-label">• Role-based access control (RBAC)</text>
</svg>